<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <div class="container">
        <h1 class="mt-5">User Management System</h1>
        <div class="mt-3">
            <a href="/sql-join" class="btn btn-info">Display All Items</a>

            <a href="{{ url_for('view_users') }}" class="btn btn-info">View and Edit Users</a>

            <a href="{{ url_for('show_search_user_items_form') }}" class="btn btn-info">View and Edit Users Items</a>
        </div>
    </div>
</body>
</html>
