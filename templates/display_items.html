<!DOCTYPE html>
<html lang="en">
<head>
    <title>Itmes List</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5" style="text-align: center;">Item List</h2>
        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark"> <!-- creates a dark background for the table header -->
                <tr>
                    <th>ID</th>
                    <th>description</th>
                    <th>price</th>
                    <th>categoryID</th>
                </tr>
            </thead>
            <tbody> <!-- table body -- loop through all of the users -->
                {% for item in Inventory %}
                <tr>
                    <td>{{ item['ID'] }}</td>
                    <td>{{ item['description'] }}</td>
                    <td>{{ item['price'] }}</td>
                    <td>{{ item['categoryID'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
 </body>
</html>
